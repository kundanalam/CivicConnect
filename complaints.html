<h1 id="pageTitle">📋 All Complaints</h1>
<div class="search-box">

<input type="text" id="searchInput" placeholder="🔍 Search Complaint ID">
<button onclick="searchComplaint()">Search</button>

</div>
<div class="mini-cards">

<div class="mini-card">
<h3 id="totalCount">loading...</h3>
<p>Total</p>
</div>

<div class="mini-card">
<h3 id="pendingCount">loading...</h3>
<p>Pending</p>
</div>

<div class="mini-card">
<h3 id="resolvedCount">loading...</h3>
<p>Resolved</p>
</div>

</div>
<select id="statusFilter" onchange="filterComplaints()">
    <option value="All">All Complaints</option>
    <option value="Pending">Pending</option>
    <option value="In Progress">In Progress</option>
    <option value="Resolved">Resolved</option>
</select>


<table class="complaints-table">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Village</th>
            <th>Category</th>
            <th>Status</th>
            <th>Image</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="complaintsContainer"></tbody>

</table>
